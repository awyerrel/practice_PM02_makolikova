# pytest.ini
[pytest]
# Основные настройки
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Настройки вывода
addopts = 
    -v
    --strict-markers
    --tb=short
    --capture=no
    --maxfail=1
    --disable-warnings
    --color=yes

# Маркеры для тестов
markers =
    unit: Unit tests (быстрые, изолированные)
    integration: Integration tests (требуют внешних ресурсов)
    slow: Медленные тесты
    performance: Тесты производительности
    smoke: Дымовые тесты
    regression: Регрессионные тесты
    mutation: Тесты для мутационного тестирования
    api: Тесты API
    db: Тесты базы данных
    e2e: End-to-end тесты

# Фильтры и исключения
norecursedirs = .git .tox venv __pycache__ env .venv node_modules
pythonpath = .

# Настройки покрытия
# (переопределяется в команде pytest --cov)

# Дополнительные опции
console_output_style = progress
junit_family = xunit2
timeout = 300
timeout_method = thread

# Пропуск определенных тестов при определенных условиях
xfail_strict = true