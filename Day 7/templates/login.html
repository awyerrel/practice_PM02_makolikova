{% extends "base.html" %}

{% block title %}Авторизация{% endblock %}

{% block content %}

<div class="login-box">

<h2>Вход в систему</h2>

<form method="POST">

<label>Логин</label>
<input type="text" name="login" required>

<label>Пароль</label>
<input type="password" name="password" required>

<label>Капча: {{ num1 }} + {{ num2 }}</label>
<input type="text" name="captcha" required>

<button type="submit">
Войти
</button>

</form>

</div>

{% endblock %}
