{% extends "base.html" %}

{% block title %}Добавление пользователя{% endblock %}

{% block content %}

<h1>Добавление пользователя</h1>

<form method="POST">

<label>Логин</label>
<input type="text" name="login" required>

<label>Пароль</label>
<input type="password" name="password" required>

<label>Роль</label>

<select name="role">

<option value="worker">
Работник
</option>

<option value="admin">
Администратор
</option>

</select>

<button type="submit">
Создать
</button>

</form>

<br>

<a href="{{ url_for('admin_users') }}">
Назад
</a>

{% endblock %}
